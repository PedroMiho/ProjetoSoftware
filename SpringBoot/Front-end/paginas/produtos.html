<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Lista de Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
        }

        main {
            flex: 1;
        }

        tr {
            text-align: center;
        }

        footer {
            background: #212529;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>

</head>

<body>

    <!-- HEADER -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="index.html">
                ProductHub
            </a>

            <div>
                <a href="../index.html" class="btn btn-outline-light btn-sm">Home</a>
                <a href="cadastro.html" class="btn btn-outline-light btn-sm">Cadastrar</a>
            </div>

        </div>
    </nav>


    <!-- CONTEÚDO -->
    <main>

        <div class="container mt-5">

            <h2>Produtos Cadastrados</h2>

            <table class="table table-striped table-bordered">

                <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Produto</th>
                        <th>Marca</th>
                        <th>Tamanho</th>
                        <th>Preço</th>
                        <th>Quantidade</th>
                        <th>Valor Estoque</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody id="tabelaProdutos">

                </tbody>

            </table>

            <a href="cadastro.html" class="btn btn-primary">
                Cadastrar Novo Produto
            </a>

        </div>

    </main>


    <!-- FOOTER -->
    <footer>

        <p>© 2026 ProductHub - Sistema de Gerenciamento de Produtos</p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/listaRoupa.js"></script>

</body>

</html>
