<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
        }

        main {
            flex: 1;
        }

        footer {
            background: #212529;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>

</head>

<body>

    <!-- HEADER -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="index.html">
                ProductHub
            </a>

            <div>
                <a href="../index.html" class="btn btn-outline-light btn-sm">Home</a>
                <a href="produtos.html" class="btn btn-outline-light btn-sm">Produtos</a>
            </div>

        </div>
    </nav>


    <!-- CONTEÚDO -->
    <main>

        <div class="container mt-5">

            <h2>Cadastrar Produto</h2>

            <form id="formProduto">

                <div class="mb-3">
                    <label class="form-label">Nome do Produto</label>
                    <input type="text" class="form-control" id="nome" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Marca</label>
                    <input type="text" class="form-control" id="marca" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tamanho</label>
                    <select class="form-control" id="tamanho">
                        <option value="P">P</option>
                        <option value="M">M</option>
                        <option value="G">G</option>
                        <option value="GG">GG</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Preço</label>
                    <input type="number" class="form-control" id="preco" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantidade</label>
                    <input type="number" class="form-control" id="quantidade" required>
                </div>

                <button type="submit" class="btn btn-primary">
                    Cadastrar Produto
                </button>

                <a href="produtos.html" class="btn btn-success">
                    Ver Produtos
                </a>

            </form>


            <div id="mensagem" class="mt-3"></div>

            </div>

        </div>

    </main>


    <!-- FOOTER -->
    <footer>

        <p>© 2026 ProductHub - Sistema de Gerenciamento de Produtos</p>

    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/cadastro.js"></script>

</body>

</html>
